name: Auto Preprocessing Pipeline

on:
  # Trigger manual dari tab Actions
  workflow_dispatch:
  
  # Trigger otomatis saat ada push ke branch main
  push:
    branches:
      - main
    paths:
      - 'diabetes_raw/diabetes.csv'
      - 'preprocessing/automate_project.py.py'

jobs:
  preprocess:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      
      # 2. Setup Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # 3. Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn
      
      # 4. Run preprocessing script
      - name: Run Preprocessing
        run: python preprocessing/automate_Nama-siswa.py
      
      # 5. Commit and push preprocessed dataset
      - name: Commit & Push Processed Dataset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Cek apakah ada perubahan
          if git diff --quiet && git diff --staged --quiet; then
            echo "✅ Tidak ada perubahan pada dataset hasil preprocessing"
          else
            git add diabetes_preprocessing/
            git commit -m "🤖 Auto-update: preprocessed dataset $(date '+%Y-%m-%d %H:%M:%S')"
            git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
            echo "✅ Dataset hasil preprocessing berhasil di-commit dan di-push"
          fi
